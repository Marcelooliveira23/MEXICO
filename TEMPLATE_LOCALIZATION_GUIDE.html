<!-- ================================ EXAMPLE 9: DATA ATTRIBUTES FOR i18n ================================ -->

<!-- Alternative approach using data-i18n attributes for client-side rendering -->

<!--
<!-- Before: Hardcoded text -->
<div id="stats">
  <p>Total de Aeronaves: <strong>42</strong></p>
  <p>Em Serviço: <strong>38</strong></p>
  <p>Fora de Serviço: <strong>4</strong></p>
</div>

<!-- After: Data-driven with client-side i18n -->
<div id="stats">
  <p data-i18n="total_aircraft">Total Aircraft: <strong id="total-count">42</strong></p>
  <p data-i18n="in_service">In Service: <strong id="active-count">38</strong></p>
  <p data-i18n="out_of_service">Out of Service: <strong id="oos-count">4</strong></p>
</div>

<script>
// JavaScript i18n helper
function translatePage() {
  document.querySelectorAll('[data-i18n]').forEach(element => {
    const key = element.getAttribute('data-i18n');
    const translation = i18n.translations[key];
    if (translation) {
      element.innerHTML = translation.replace('{value}', element.innerHTML);
    }
  });
}
</script>

<!-- ================================ EXAMPLE 10: BEST PRACTICES ================================ -->

<!-- DO's -->
<!--
✓ Always use {{ _('English text') }} for translatable strings
✓ Use specific, short English messages
✓ Provide context for abbreviations (use title attributes for acronyms)
✓ Use semantic HTML (use <button>, <nav>, <aside>, etc.)
✓ Include aria-labels for accessibility
✓ Use Bootstrap classes for consistency
✓ Include icons from Bootstrap Icons library
✓ Validate all form input on both client and server
-->

<!-- DON'Ts -->
<!--
✗ Don't use Portuguese/Spanish in templates
✗ Don't mix languages in the same message
✗ Don't hardcode user-facing strings
✗ Don't use deprecated Bootstrap classes
✗ Don't forget CSRF tokens in forms
✗ Don't skip input validation
✗ Don't use generic error messages
✗ Don't depend on client-side validation only
-->
