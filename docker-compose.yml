version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: troubleshooting-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-Costera23}
      MYSQL_DATABASE: ${MYSQL_DB:-troubleshooting_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: troubleshooting-app
    restart: unless-stopped
    depends_on:
      - mysql
    env_file:
      - .env
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Costera23}
      MYSQL_DB: ${MYSQL_DB:-troubleshooting_db}
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data:
